<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packages Checker</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2e;
      --accent: #5ce1e6;
      --text: #f4f7fb;
      --muted: #8ba0c2;
      --border: #1e2a44;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(92,225,230,0.1), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(92,225,230,0.12), transparent 30%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px 48px;
      display: flex;
      justify-content: center;
    }
    .shell {
      width: min(1200px, 100%);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: 0.02em; }
    .hint { color: var(--muted); font-size: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
    }
    label { display: block; color: var(--muted); margin-bottom: 6px; font-size: 14px; }
    textarea, input[type="file"], button, select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1728;
      color: var(--text);
      padding: 12px;
      font-size: 15px;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }
    textarea { min-height: 160px; resize: vertical; }
    input[type="file"] { padding: 10px; }
    button {
      cursor: pointer;
      background: linear-gradient(120deg, #5ce1e6, #7cf1c4);
      color: #0b1220;
      border: none;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 10px 20px rgba(92,225,230,0.25);
    }
    button:hover { box-shadow: 0 12px 26px rgba(92,225,230,0.35); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    textarea:focus, input[type="file"]:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(92,225,230,0.2); }
    pre {
      background: #0f1728;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      color: #e7ecf5;
    }
    .row { display: flex; align-items: center; gap: 8px; justify-content: space-between; }
    .tag { padding: 4px 10px; border-radius: 999px; background: rgba(92,225,230,0.1); color: var(--accent); border: 1px solid rgba(92,225,230,0.4); font-size: 12px; }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>Packages Checker包裹检测器</h1>
        <div class="hint">上传图像进行检测，或维护/扩展规则文档。</div>
      </div>
      <div class="tag">FastAPI</div>
    </header>

    <div class="grid">
      <div class="card">
        <div class="row"><h3>图像评估</h3><span class="tag">/vision-assess</span></div>
        <form id="vision-form">
          <label for="image">上传图像 (jpg/png/webp)</label>
          <input type="file" id="image" name="image" accept="image/*" />
          <label for="vision-provider" style="margin-top:8px;">模型提供商</label>
          <select id="vision-provider" name="vision-provider">
            <option value="">默认（环境变量）</option>
            <option value="gemini">Gemini</option>
            <option value="openai">OpenAI</option>
            <option value="openai_compat">OpenAI Compatible</option>
          </select>
          <label for="vision-waybill" style="margin-top:8px;">运单号（可选）</label>
          <input type="text" id="vision-waybill" name="vision-waybill" placeholder="例如：WB1001" />
          <label for="vision-insured" style="margin-top:8px;">是否保价</label>
          <select id="vision-insured" name="vision-insured">
            <option value="">未提供</option>
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
          <label for="vision-full-insured" style="margin-top:8px;">是否足额保价</label>
          <select id="vision-full-insured" name="vision-full-insured">
            <option value="">未提供</option>
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
          <div style="margin-top:12px; display:flex; gap:8px;">
            <button type="submit" id="vision-submit">分析与评估</button>
          </div>
        </form>
        <div style="margin-top:12px;">
          <label>图像分析</label>
          <pre id="vision-analysis">等待中...</pre>
          <label>评估结果</label>
          <pre id="vision-result">等待中...</pre>
          <label>赔付依据</label>
          <pre id="vision-reasons">等待中...</pre>
        </div>
      </div>

      <div class="card">
        <div class="row"><h3>上传文档</h3><span class="tag">/docs</span></div>
        <form id="doc-form">
          <label for="doc-id">文档ID</label>
          <input type="text" id="doc-id" name="doc-id" placeholder="policy-001" />
          <label for="doc-content" style="margin-top:8px;">内容</label>
          <textarea id="doc-content" name="doc-content" placeholder="赔付规则或说明文本"></textarea>
          <label for="doc-meta" style="margin-top:8px;">元数据 (JSON，可选)</label>
          <textarea id="doc-meta" name="doc-meta" placeholder='{"source":"manual"}'></textarea>
          <div style="margin-top:12px; display:flex; gap:8px;">
            <button type="submit" id="doc-submit">添加 / 更新</button>
            <button type="button" id="doc-ingest">刷新向量库</button>
          </div>
        </form>
        <div style="margin-top:12px;">
          <label>结果</label>
          <pre id="doc-result">等待中...</pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const visionForm = document.getElementById("vision-form");
    const visionAnalysis = document.getElementById("vision-analysis");
    const visionResult = document.getElementById("vision-result");
    const visionReasons = document.getElementById("vision-reasons");
    const visionSubmit = document.getElementById("vision-submit");
    const visionInsuredSelect = document.getElementById("vision-insured");
    const visionFullInsuredSelect = document.getElementById("vision-full-insured");
    const visionWaybillInput = document.getElementById("vision-waybill");
    const visionProviderSelect = document.getElementById("vision-provider");

    const docForm = document.getElementById("doc-form");
    const docSubmit = document.getElementById("doc-submit");
    const docResult = document.getElementById("doc-result");
    const docIngest = document.getElementById("doc-ingest");

    function parseOptionalBool(value) {
      if (value === "true") return true;
      if (value === "false") return false;
      return null;
    }

    async function handleVisionSubmit(e) {
      e.preventDefault();
      const fileInput = document.getElementById("image");
      const file = fileInput.files[0];
      if (!file) {
        visionAnalysis.textContent = "请选择一张图像。";
        return;
      }
      const insured = parseOptionalBool(visionInsuredSelect.value);
      const fullInsured = parseOptionalBool(visionFullInsuredSelect.value);
      const waybillNo = visionWaybillInput.value.trim();
      const provider = visionProviderSelect.value.trim();
      visionSubmit.disabled = true;
      visionAnalysis.textContent = "正在分析图像...";
      visionResult.textContent = "正在评估...";
      visionReasons.textContent = "正在生成依据...";
      const formData = new FormData();
      formData.append("file", file);
      if (insured !== null) formData.append("insured", insured);
      if (fullInsured !== null) formData.append("full_insured", fullInsured);
      if (waybillNo) formData.append("waybill_no", waybillNo);
      if (provider) formData.append("provider", provider);
      try {
        const res = await fetch("/vision-assess", { method: "POST", body: formData });
        const data = await res.json();
        if (res.ok) {
          const analysis = data.analysis || {};
          const raw = analysis.raw ?? analysis;
          visionAnalysis.textContent = raw ? JSON.stringify(raw, null, 2) : JSON.stringify(analysis, null, 2);
          visionResult.textContent = data.result || JSON.stringify(data, null, 2);
          if (Array.isArray(data.reasons) && data.reasons.length) {
            visionReasons.textContent = data.reasons.join("; ");
          } else if (data.rag) {
            visionReasons.textContent = data.rag;
          } else {
            visionReasons.textContent = "未提供依据";
          }
        } else {
          visionAnalysis.textContent = data.detail || "Error";
          visionResult.textContent = data.detail || "Error";
          visionReasons.textContent = data.detail || "Error";
        }
      } catch (err) {
        visionAnalysis.textContent = err.message || String(err);
        visionResult.textContent = err.message || String(err);
        visionReasons.textContent = err.message || String(err);
      } finally {
        visionSubmit.disabled = false;
      }
    }

    visionForm.addEventListener("submit", handleVisionSubmit);

    async function handleDocSubmit(e) {
      e.preventDefault();
      const id = document.getElementById("doc-id").value.trim();
      const content = document.getElementById("doc-content").value.trim();
      const metaRaw = document.getElementById("doc-meta").value.trim();
      if (!id || !content) {
        docResult.textContent = "请提供文档ID和内容。";
        return;
      }
      let metadata = undefined;
      if (metaRaw) {
        try { metadata = JSON.parse(metaRaw); }
        catch (err) { docResult.textContent = "元数据JSON无效"; return; }
      }
      docSubmit.disabled = true;
      docResult.textContent = "正在提交...";
      try {
        const res = await fetch("/docs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, content, metadata }),
        });
        const data = await res.json();
        docResult.textContent = res.ok ? JSON.stringify(data, null, 2) : data.detail || "错误";
      } catch (err) {
        docResult.textContent = err.message || String(err);
      } finally {
        docSubmit.disabled = false;
      }
    }

    docForm.addEventListener("submit", handleDocSubmit);

    async function handleDocIngest() {
      docIngest.disabled = true;
      docResult.textContent = "正在刷新向量库...";
      try {
        const res = await fetch("/docs/ingest", { method: "POST" });
        const data = await res.json();
        docResult.textContent = res.ok ? JSON.stringify(data, null, 2) : data.detail || "错误";
      } catch (err) {
        docResult.textContent = err.message || String(err);
      } finally {
        docIngest.disabled = false;
      }
    }

    docIngest.addEventListener("click", handleDocIngest);
  </script>
</body>
</html>
